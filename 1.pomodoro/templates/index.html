<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ポモドーロタイマー</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow: hidden;
            position: relative;
            transition: background 1s ease;
        }

        body.focus-mode {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        body.warning-mode {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* パーティクルアニメーション */
        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 50%;
            pointer-events: none;
            animation: float 10s infinite;
        }

        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) translateX(100px) scale(1);
                opacity: 0;
            }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 90%;
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 2.5em;
            font-weight: 700;
        }

        .timer-container {
            position: relative;
            width: 300px;
            height: 300px;
            margin: 0 auto 40px;
        }

        /* 円形プログレスバー */
        .progress-ring {
            transform: rotate(-90deg);
            position: absolute;
            top: 0;
            left: 0;
        }

        .progress-ring-circle {
            transition: stroke-dashoffset 0.5s ease, stroke 1s ease;
            transform-origin: 50% 50%;
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3.5em;
            font-weight: 700;
            color: #333;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
        }

        button {
            padding: 15px 30px;
            font-size: 1.1em;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
        }

        button:active {
            transform: translateY(0);
        }

        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-pause {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-reset {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .mode-btn {
            padding: 10px 20px;
            font-size: 0.9em;
            background: #e0e0e0;
            color: #333;
        }

        .mode-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .status {
            margin-top: 20px;
            font-size: 1.2em;
            color: #666;
            font-weight: 500;
        }

        /* 波紋エフェクト */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            animation: ripple-animation 2s ease-out;
        }

        @keyframes ripple-animation {
            0% {
                width: 0;
                height: 0;
                opacity: 0.8;
            }
            100% {
                width: 600px;
                height: 600px;
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- パーティクル背景 -->
    <div id="particles"></div>

    <div class="container">
        <h1>🍅 ポモドーロタイマー</h1>
        
        <div class="timer-container">
            <svg class="progress-ring" width="300" height="300">
                <circle
                    class="progress-ring-bg"
                    stroke="#e0e0e0"
                    stroke-width="12"
                    fill="transparent"
                    r="140"
                    cx="150"
                    cy="150"
                />
                <circle
                    class="progress-ring-circle"
                    id="progress-circle"
                    stroke="#4facfe"
                    stroke-width="12"
                    fill="transparent"
                    r="140"
                    cx="150"
                    cy="150"
                    stroke-dasharray="879.646"
                    stroke-dashoffset="0"
                    stroke-linecap="round"
                />
            </svg>
            <div class="timer-display" id="timer">25:00</div>
        </div>

        <div class="controls">
            <button class="btn-start" id="startBtn" onclick="startTimer()">開始</button>
            <button class="btn-pause" id="pauseBtn" onclick="pauseTimer()">一時停止</button>
            <button class="btn-reset" onclick="resetTimer()">リセット</button>
        </div>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode('focus', 25)">集中 (25分)</button>
            <button class="mode-btn" onclick="setMode('shortBreak', 5)">短休憩 (5分)</button>
            <button class="mode-btn" onclick="setMode('longBreak', 15)">長休憩 (15分)</button>
        </div>

        <div class="status" id="status">準備完了</div>
    </div>

    <script>
        let timeLeft = 25 * 60; // 秒単位
        let totalTime = 25 * 60;
        let timerInterval = null;
        let isRunning = false;
        let currentMode = 'focus';

        const timerDisplay = document.getElementById('timer');
        const statusDisplay = document.getElementById('status');
        const progressCircle = document.getElementById('progress-circle');
        const radius = 140;
        const circumference = 2 * Math.PI * radius;

        // パーティクル生成
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            particlesContainer.innerHTML = '';
            
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 10 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // 初期化
        createParticles();
        updateDisplay();
        updateProgress();

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerDisplay.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function updateProgress() {
            const progress = (timeLeft / totalTime);
            const offset = circumference * (1 - progress);
            progressCircle.style.strokeDashoffset = offset;

            // 色の変化: 青 → 黄 → 赤
            let color;
            if (progress > 0.5) {
                // 青から黄へ
                const blueToYellow = (progress - 0.5) * 2;
                color = interpolateColor('#4facfe', '#f5d020', blueToYellow);
            } else {
                // 黄から赤へ
                const yellowToRed = progress * 2;
                color = interpolateColor('#f5576c', '#f5d020', yellowToRed);
            }
            progressCircle.style.stroke = color;

            // 背景色の変更
            if (currentMode === 'focus') {
                if (progress < 0.25) {
                    document.body.className = 'warning-mode';
                } else {
                    document.body.className = 'focus-mode';
                }
            }
        }

        function interpolateColor(color1, color2, factor) {
            const c1 = hexToRgb(color1);
            const c2 = hexToRgb(color2);
            const r = Math.round(c1.r + factor * (c2.r - c1.r));
            const g = Math.round(c1.g + factor * (c2.g - c1.g));
            const b = Math.round(c1.b + factor * (c2.b - c1.b));
            return `rgb(${r}, ${g}, ${b})`;
        }

        function hexToRgb(hex) {
            const result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function startTimer() {
            if (!isRunning) {
                isRunning = true;
                statusDisplay.textContent = currentMode === 'focus' ? '集中中...' : '休憩中...';
                
                timerInterval = setInterval(() => {
                    if (timeLeft > 0) {
                        timeLeft--;
                        updateDisplay();
                        updateProgress();
                    } else {
                        completeTimer();
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            statusDisplay.textContent = '一時停止中';
        }

        function resetTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            timeLeft = totalTime;
            updateDisplay();
            updateProgress();
            statusDisplay.textContent = '準備完了';
            document.body.className = '';
        }

        function completeTimer() {
            isRunning = false;
            clearInterval(timerInterval);
            statusDisplay.textContent = '完了！';
            
            // 完了アニメーション
            createRipple();
            
            // 通知
            if (Notification.permission === 'granted') {
                new Notification('ポモドーロタイマー', {
                    body: currentMode === 'focus' ? '集中時間が終了しました！休憩しましょう。' : '休憩時間が終了しました！',
                    icon: '🍅'
                });
            }
        }

        function setMode(mode, minutes) {
            if (!isRunning) {
                currentMode = mode;
                totalTime = minutes * 60;
                timeLeft = totalTime;
                updateDisplay();
                updateProgress();
                
                // アクティブボタンの更新
                document.querySelectorAll('.mode-btn').forEach(btn => {
                    btn.classList.remove('active');
                });
                event.target.classList.add('active');
                
                document.body.className = '';
                statusDisplay.textContent = '準備完了';
            }
        }

        function createRipple() {
            const container = document.querySelector('.container');
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            
            const rect = container.getBoundingClientRect();
            ripple.style.left = (rect.width / 2) + 'px';
            ripple.style.top = (rect.height / 2) + 'px';
            
            container.appendChild(ripple);
            
            setTimeout(() => {
                ripple.remove();
            }, 2000);
        }

        // 通知の許可をリクエスト
        if (Notification.permission === 'default') {
            Notification.requestPermission();
        }
    </script>
</body>
</html>
